<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdullah Raad | AI-Assisted Developer</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        html[lang="en"] .lang-ar { display: none; }
        html[lang="ar"] .lang-en { display: none; }
        html[lang="ar"] { direction: rtl; }

        body {
            background: #09090b;
            color: #fafafa;
        }

        .glass {
            background: rgba(24,24,27,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>

<body class="font-sans">

<!-- NAV -->
<nav class="fixed top-0 w-full glass z-50">
    <div class="max-w-6xl mx-auto px-6 h-16 flex justify-between items-center">
        <h1 class="font-bold text-xl">AR.</h1>

        <button onclick="toggleLanguage()" class="text-sm border px-3 py-1 rounded">
            عربي / EN
        </button>
    </div>
</nav>

<!-- HERO -->
<section class="pt-32 text-center max-w-4xl mx-auto px-6">
    <h1 class="text-5xl font-bold mb-6">
        <span class="lang-en">Abdullah Raad</span>
        <span class="lang-ar">عبدالله رعد</span>
    </h1>

    <p class="text-zinc-400 text-lg">
        <span class="lang-en">AI-Assisted Developer building modern systems and smart applications.</span>
        <span class="lang-ar">مطور يعتمد على الذكاء الاصطناعي لبناء أنظمة حديثة وتطبيقات ذكية.</span>
    </p>
</section>

<!-- CONTACT -->
<section id="contact" class="max-w-xl mx-auto mt-20 px-6">
    <div class="glass p-8 rounded-2xl">

        <h2 class="text-2xl font-bold mb-6 text-center">
            <span class="lang-en">Contact Me</span>
            <span class="lang-ar">تواصل معي</span>
        </h2>

        <!-- FIXED FORM -->
        <form action="https://formspree.io/f/xbdqyrzg" method="POST" class="space-y-4">

            <input type="text" name="name" required
                class="w-full p-3 rounded bg-zinc-900 border border-zinc-700"
                placeholder="Your Name">

            <input type="email" name="email" required
                class="w-full p-3 rounded bg-zinc-900 border border-zinc-700"
                placeholder="Your Email">

            <textarea name="message" rows="4" required
                class="w-full p-3 rounded bg-zinc-900 border border-zinc-700"
                placeholder="Your Message"></textarea>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold">
                Send Message
            </button>

        </form>
    </div>
</section>

<!-- FOOTER -->
<footer class="mt-20 text-center text-zinc-500 text-sm pb-10">
    © 2026 Abdullah Raad
</footer>

<script>
function toggleLanguage() {
    const html = document.documentElement;
    html.lang = html.lang === "en" ? "ar" : "en";
}
</script>

</body>
</html>
